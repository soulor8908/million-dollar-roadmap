name: 🌅 Daily Check & Reminder

on:
  schedule:
    - cron: '30 14 * * *'  # 北京时间22:30检查（娃睡后）
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check today's log
        id: check
        run: |
          TODAY=$(date +%Y-%m-%d)
          FILE="daily/${TODAY}.md"

          if [ -f "$FILE" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            if grep -q "复盘" "$FILE"; then
              echo "review=true" >> $GITHUB_OUTPUT
            else
              echo "review=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "review=false" >> $GITHUB_OUTPUT
          fi

          echo "today=$TODAY" >> $GITHUB_OUTPUT

      - name: Create reminder issue
        if: steps.check.outputs.found == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const today = '${{ steps.check.outputs.today }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ ${today} 未打卡提醒`,
              body: `@${context.repo.owner} 今天还没有提交计划和复盘！\n\n请在23:30前完成：\n- [ ] 算法题\n- [ ] 学习记录\n- [ ] 填写今日复盘\n\n> 💡 提示：即使只学了30分钟，也要记录。坚持记录比完美执行更重要。`,
              labels: ['missed-check']
            });
