# wrangler.toml — 主项目 million-dollar-roadmap
# Cloudflare Pages 部署配置

name = "million-dollar-roadmap"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[vars]
AI_PROVIDER = "glm"
# 以下密钥通过 `wrangler pages secret put <NAME> --project-name=million-dollar-roadmap` 上传：
# - GLM_API_KEY  : AI 分析用 API Key
# - GITHUB_OWNER : GitHub 仓库 owner（默认 soulor8908）
# - GITHUB_REPO  : GitHub 仓库名（默认 million-dollar-roadmap）
