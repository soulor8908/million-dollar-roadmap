# wrangler.toml
# Cloudflare Pages 配置
# 部署：npx wrangler pages deploy .vercel/output/static --project-name=devpath

name = "devpath"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[[kv_namespaces]]
binding = "KV"
id = "086d793456e5425bacb04836da93ad9b"
preview_id = "086d793456e5425bacb04836da93ad9b"

[vars]
PUBLIC_AUTH_TOKEN = "dev-token-change-in-prod"
AI_PROVIDER = "deepseek"
# DEEPSEEK_API_KEY 通过 `wrangler pages secret put DEEPSEEK_API_KEY --project-name=devpath` 上传
